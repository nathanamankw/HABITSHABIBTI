<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habits Habibti</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f12;
      color: #fff;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 540px; }
    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, #f5c542, #f59342);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { margin-top: 1rem; font-size: 1.15rem; color: #9b9ba3; line-height: 1.6; }
    .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.5rem 1rem;
      border: 1px solid #2a2a30;
      border-radius: 999px;
      font-size: 0.85rem;
      color: #6b6b73;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Habits Habibti</h1>
    <p>Coming soon. The site is live and connected to Vercel.</p>
    <span class="badge">🚀 Deployed via GitHub → Vercel</span>
  </div>
</body>
</html>
